# Remote theme directory
remote_theme: analytics-link/analytics-link.github.io

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-remote-theme

#-------------------------------
# General Site Settings
title: Chidiebere Chimezie
description: "Hi, I’m Chidiebere, a Data Scientist & Analytics professional. My portfolio focuses on solving business problems in the Credit, Finance, and FinTech industries to deliver tangible value. Please check out my GitHub and LinkedIn, or download my Resume below!"
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com

#-------------------------------
# About Section
subtitle: Data Science | <span style="color:#f58506"> Analytics </span>
location: "New York, US"
resume_url: /docs/Chidiebere Sam Chimezie Resume 2026.docx
avatar_image: /img/Profile_pic.png

#-------------------------------
# Contact links
linkedln: "https://www.linkedin.com/in/-chimezie/" 
github: "https://github.com/cschimezie-dot"  

paginate: 6
paginate_path: "/page/:num"

sass:
  sass_dir: _sass
  style: compressed # possible values: nested expanded compact compressed

defaults:
  - scope:
      type: posts
    values:
      layout: post
      read_time: true
      share: false

